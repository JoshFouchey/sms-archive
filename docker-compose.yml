# -----------------------------------------------------------------------------
# SMS Archive Compose
# -----------------------------------------------------------------------------
# NOTE ON SWARM:
# This file is plain Docker Compose (single-node). If the Docker Engine is/was
# in swarm mode, compose still creates *bridge* networks locally, it does NOT
# create overlay networks or distribute services. Leaving swarm removes any
# overlay networks you may have relied on. If you previously had a global
# proxy network (overlay) its name now no longer exists; you must re-create a
# standard bridge network manually for cross-stack container discovery:
#   docker network create proxy
# If you do NOT need a shared reverse proxy, you can remove the 'proxy' network
# from services entirely.
# -----------------------------------------------------------------------------
# To use an externally pre-created network, change the definition below to:
#   proxy:
#     external: true
#     name: proxy
# Then ensure it's created (idempotent):
#   docker network create proxy || true
# -----------------------------------------------------------------------------
networks:
  proxy:
    external: true
  internal:
    driver: bridge

services:
  db:
    image: pgvector/pgvector:${DB_VERSION}
    hostname: sms-archive-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: ${TZ}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ${DB_DATA_HOST_PATH}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://sms-archive-db:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      APP_BASE_URL: ${APP_BASE_URL}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      SMSARCHIVE_MEDIA_ROOT: /app/media/messages
      SMSARCHIVE_IMPORT_DIRECTORY_ENABLED: ${SMSARCHIVE_IMPORT_DIRECTORY_ENABLED:-false}
      SMSARCHIVE_IMPORT_DIRECTORY_PATH: /app/import-drop
      SMSARCHIVE_IMPORT_DIRECTORY_SCAN_INTERVAL: ${SMSARCHIVE_IMPORT_DIRECTORY_SCAN_INTERVAL:-300}
      SMSARCHIVE_IMPORT_DIRECTORY_DELETE_AFTER_IMPORT: ${SMSARCHIVE_IMPORT_DIRECTORY_DELETE_AFTER_IMPORT:-false}
      SMSARCHIVE_IMPORT_DIRECTORY_RETENTION_DAYS: ${SMSARCHIVE_IMPORT_DIRECTORY_RETENTION_DAYS:-7}
      SMSARCHIVE_IMPORT_DIRECTORY_FILE_AGE_THRESHOLD: ${SMSARCHIVE_IMPORT_DIRECTORY_FILE_AGE_THRESHOLD:-30}
      # AI / LLM connection (OpenAI-compatible — works with llama.cpp, Ollama, etc.)
      SPRING_AI_OPENAI_API_KEY: ${SPRING_AI_OPENAI_API_KEY:-not-needed}
      SPRING_AI_OPENAI_CHAT_BASE_URL: ${SPRING_AI_OPENAI_CHAT_BASE_URL:-http://llama-cpp-sql:8080}
      SPRING_AI_OPENAI_EMBEDDING_BASE_URL: ${SPRING_AI_OPENAI_EMBEDDING_BASE_URL:-http://llama-cpp-embed:8080}
      SMSARCHIVE_AI_ENABLED: ${SMSARCHIVE_AI_ENABLED:-true}
      SMSARCHIVE_AI_EMBEDDING_MODEL: ${SMSARCHIVE_AI_EMBEDDING_MODEL:-qwen3-embedding-0.6b}
      SMSARCHIVE_AI_CHAT_MODEL: ${SMSARCHIVE_AI_CHAT_MODEL:-qwen2.5-coder-3b-instruct}
      SMSARCHIVE_AI_SQL_MODEL: ${SMSARCHIVE_AI_SQL_MODEL:-qwen2.5-coder-3b-instruct}
      DB_HOST: sms-archive-db
      DB_WAIT_MAX_SECONDS: 120
      TZ: ${TZ}
      JAVA_TOOL_OPTIONS: "-Djdk.xml.maxGeneralEntitySizeLimit=${XML_MAX_GENERAL_ENTITY_SIZE:-5000000} -Djdk.xml.totalEntitySizeLimit=${XML_TOTAL_ENTITY_SIZE_LIMIT:-0} -Djdk.xml.entityExpansionLimit=${XML_ENTITY_EXPANSION_LIMIT:-0}"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT}:8080"
    volumes:
      - ${MEDIA_ROOT_HOST_PATH}:/app/media/messages
      - ${IMPORT_DROP_HOST_PATH:-./import-drop}:/app/import-drop
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5
    networks:
      - internal
      - proxy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CSP_CONNECT_SRC: ${CSP_CONNECT_SRC}
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT}:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 5
    networks:
      - internal
      - proxy
